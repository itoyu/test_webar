<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sticker AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }

      #tap-to-start {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        color: white;
        font-size: 24px;
        font-family: sans-serif;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <!-- タップ促進オーバーレイ -->
    <div id="tap-to-start">
      📱 タップしてARを開始
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-marker
        type="pattern"
        url="marker/pattern.patt"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.005"
        smoothThreshold="2"
        patternRatio="0.75"
        id="my-marker"
      >
        <a-video
          src="#ar-video"
          width="1.6"
          height="0.9"
          position="0 0.5 0"
          rotation="-90 0 0"
        ></a-video>
      </a-marker>

      <a-assets>
        <video
          id="ar-video"
          src="videos/sample.mp4"
          preload="auto"
          loop="true"
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const overlay = document.getElementById('tap-to-start');
      const video = document.getElementById('ar-video');
      const marker = document.getElementById('my-marker');
      let userInteracted = false;
      let markerVisible = false;

      // ページ読み込み後にオーバーレイを表示
      window.addEventListener('load', () => {
        overlay.style.display = 'flex';
      });

      // タップで動画を「解放」する（iOSの制限を回避）
      overlay.addEventListener('click', () => {
        overlay.style.display = 'none';
        // 一瞬再生してすぐ止める → iOSに再生権限を与える
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
          userInteracted = true;
          // すでにマーカーが見えていたら再生開始
          if (markerVisible) video.play();
        }).catch(e => console.log(e));
      });

      // マーカー検出
      marker.addEventListener('markerFound', () => {
        markerVisible = true;
        if (userInteracted) video.play();
      });

      marker.addEventListener('markerLost', () => {
        markerVisible = false;
        video.pause();
      });
    </script>
  </body>
</html>
