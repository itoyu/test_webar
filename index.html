<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sticker AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }

      #tap-to-start {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        color: white;
        font-size: 24px;
        font-family: sans-serif;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        text-align: center;
        flex-direction: column;
        gap: 12px;
      }
    </style>
  </head>
  <body>

    <div id="tap-to-start">
      📱 タップしてARを開始
    </div>

    <a-scene
      mindar-image="imageTargetSrc: marker/targets.mind; autoStart: false;"
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="ar-video"
          src="videos/sample.mp4"
          preload="auto"
          loop="true"
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#ar-video"
          width="1"
          height="0.5625"
          position="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.getElementById('tap-to-start');
      const video = document.getElementById('ar-video');
      let userInteracted = false;

      window.addEventListener('load', () => {
        overlay.style.display = 'flex';
      });

      overlay.addEventListener('click', () => {
        overlay.style.display = 'none';

        // MindARを開始
        const sceneEl = document.querySelector('a-scene');
        sceneEl.systems['mindar-image-system'].start();

        // iOSの自動再生制限を回避
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
          userInteracted = true;
        }).catch(e => console.log(e));
      });

      // マーカー検出時
      const target = document.querySelector('a-entity[mindar-image-target]');
      target.addEventListener('targetFound', () => {
        if (userInteracted) video.play();
      });
      target.addEventListener('targetLost', () => {
        video.pause();
      });
    </script>
  </body>
</html>
