<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sticker AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

      #tap-to-start {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        color: white;
        font-size: 24px;
        font-family: sans-serif;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="tap-to-start">
      📱 タップしてARを開始
    </div>

 <a-scene
  mindar-image="imageTargetSrc: marker/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
      <a-assets>
        <video
          id="ar-video"
          src="videos/sample.mp4"
          preload="auto"
          loop="true"
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#ar-video"
          width="1"
          height="0.5625"
          position="0 0 0"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
  const overlay = document.getElementById('tap-to-start');
  const video = document.getElementById('ar-video');
  const sceneEl = document.querySelector('a-scene');
  const target = document.querySelector('[mindar-image-target]');

  window.addEventListener('load', () => {
    overlay.style.display = 'flex';
  });

  overlay.addEventListener('click', async () => {
    overlay.style.display = 'none';

    // iOSに明示的にカメラ許可をリクエスト
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      stream.getTracks().forEach(track => track.stop());
    } catch(e) {
      alert('カメラの許可が必要です。設定からカメラを許可してください。');
      return;
    }

    // iOSの自動再生制限を回避
    try {
      await video.play();
      video.pause();
      video.currentTime = 0;
    } catch(e) {}

    // MindAR開始
    sceneEl.systems['mindar-image-system'].start();
  });

  target.addEventListener('targetFound', () => {
    video.play();
  });

  target.addEventListener('targetLost', () => {
    video.pause();
  });
</script>
  </body>
</html>
