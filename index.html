<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sticker AR</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6RZBHRREXH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // ★ページビューを確実に拾うため、元の標準設定（デバッグモードなし）に戻しました
      gtag('config', 'G-6RZBHRREXH');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 100vw; height: 100vh; overflow: hidden; background: #000; }

      #tap-to-start {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        color: white;
        font-size: 24px;
        font-family: sans-serif;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        text-align: center;
      }

      /* テキストを表示するためのスタイル（テロップ・ステッカー風） */
      #ar-text-overlay {
        display: none;
        position: fixed;
        bottom: 40px;
        left: 5%;
        width: 90%;
        background: transparent;
        color: #000;
        font-family: 'M PLUS Rounded 1c', sans-serif;
        font-weight: 800;
        font-size: 26px;
        line-height: 1.3;
        z-index: 999;
        text-align: center;
        pointer-events: none;

        /* 文字のまわりに綺麗な白いアウトライン（縁取り）を付ける設定 */
        text-shadow: 
          3px  3px 0 #fff,
         -3px  3px 0 #fff,
          3px -3px 0 #fff,
         -3px -3px 0 #fff,
          0px  3px 0 #fff,
          0px -3px 0 #fff,
          3px  0px 0 #fff,
         -3px  0px 0 #fff;
      }
    </style>
  </head>
  <body>

    <div id="tap-to-start">
      📱 タップしてARを開始
    </div>

    <div id="ar-text-overlay"></div>

    <a-scene
      mindar-image="imageTargetSrc: marker/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="ar-video"
          preload="auto"
          loop="true"
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        >
          <source src="videos/movie_ar1.webm" type="video/webm">
          <source src="videos/movie_ar1.mov" type="video/quicktime">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#ar-video"
          width="1"
          height="0.5625"
          position="0 0 0"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.getElementById('tap-to-start');
      const textOverlay = document.getElementById('ar-text-overlay');
      const video = document.getElementById('ar-video');
      const sceneEl = document.querySelector('a-scene');
      const target = document.querySelector('[mindar-image-target]');

      // microCMSの設定情報（変更せず維持しています）
      const MICROCMS_API_URL = 'https://event-ar-sf.microcms.io/api/v1/sanrei-foods-webar-text'; 
      const MICROCMS_API_KEY = 'kXzP9fV6eb4azihllPJGAQjarF5CkVWKZLX0'; 

      let fetchedText = ""; 

      window.addEventListener('load', () => {
        overlay.style.display = 'flex';
      });

      overlay.addEventListener('click', async () => {
        overlay.style.display = 'none';

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          stream.getTracks().forEach(track => track.stop());
        } catch(e) {
          alert('カメラの許可が必要です。設定からカメラを許可してください。');
          return;
        }

        try {
          const response = await fetch(MICROCMS_API_URL, {
            headers: {
              'X-MICROCMS-API-KEY': MICROCMS_API_KEY
            }
          });
          const data = await response.json();
          
          if (data) {
            // 変更後のフィールド名「ar_text2」をそのまま維持しています
            fetchedText = data.ar_text2 || "";
          } else {
            throw new Error('有効なデータが取得できませんでした。');
          }
        } catch (e) {
          alert('テキストの取得に失敗しました: ' + e.message);
          return;
        }

        try {
          await video.play();
          video.pause();
          video.currentTime = 0;
        } catch(e) {}

        sceneEl.systems['mindar-image-system'].start();
      });

      // マーカーが認識されたとき
      target.addEventListener('targetFound', () => {
        // ★改善：カスタムイベント関連のエラー要因をすべて排除し、以前のシンプルな処理に戻しました
        if (fetchedText) {
          textOverlay.innerText = fetchedText;
          textOverlay.style.display = 'block';
        }
        
        try {
          video.play();
        } catch(e) {
          console.error('Video Play Error:', e);
        }
      });

      // マーカーを見失ったとき
      target.addEventListener('targetLost', () => {
        textOverlay.style.display = 'none';
        video.pause();
      });
    </script>
  </body>
</html>
